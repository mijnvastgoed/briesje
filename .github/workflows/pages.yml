name: Deploy Briesje demo to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify demo safety and assets
        run: |
          test -f web/index.html
          test -f web/app.js
          test -f web/styles.css
          test -f web/assets/briesje-hero.png
          grep -q 'Demowinkel' web/index.html
          grep -q 'shippingCountry:"NL"' web/app.js
          if grep -RE 'sk_(live|test)_[A-Za-z0-9]|service_role' web; then exit 1; fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
